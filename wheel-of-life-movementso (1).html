<script>
(function(){
var CSS=`
#cs-wol-wrap{font-family:'DM Sans',sans-serif;max-width:560px;margin:0 auto;padding:1.5rem 0 2rem;background:#F7F3EC;border-radius:16px;padding:2rem 1.5rem}
#cs-wol-wrap *{box-sizing:border-box;margin:0;padding:0}
.cs-head{text-align:center;margin-bottom:1.25rem}
.cs-wordmark{font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:#2C7A68;margin-bottom:4px;font-weight:500}
.cs-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:500;color:#1B3D32}
.cs-sub{font-size:12px;color:#7A6F61;margin-top:4px;font-style:italic}
.cs-canvas-wrap{position:relative;width:100%;max-width:480px;margin:0 auto}
#cs-wol-canvas{width:100%;height:auto;display:block;cursor:pointer;border-radius:50%}
.cs-tip{position:absolute;background:#1B3D32;color:#fff;font-size:11px;padding:4px 9px;border-radius:5px;pointer-events:none;opacity:0;transition:opacity .15s;white-space:nowrap;transform:translate(-50%,-115%)}
.cs-tip.on{opacity:1}
.cs-cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:7px;margin-top:1rem}
.cs-card{background:#fff;border:1px solid #D6CABB;border-radius:9px;padding:9px 10px 10px}
.cs-cname{font-size:9px;text-transform:uppercase;letter-spacing:.07em;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.cs-cscore{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;color:#1B3D32;line-height:1}
.cs-cslider{width:100%;-webkit-appearance:none;height:3px;background:#EDE5D6;border-radius:2px;outline:none;margin-top:5px;cursor:pointer}
.cs-cslider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#2C7A68;cursor:pointer}
.cs-cslider::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:#2C7A68;border:none;cursor:pointer}
.cs-hint{font-size:11px;color:#7A6F61;text-align:center;margin-top:.75rem;font-style:italic}
.cs-actions{display:flex;gap:8px;justify-content:center;margin-top:1rem}
.cs-btn{padding:8px 16px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .18s;border:1px solid #D6CABB;background:#fff;color:#1A1714}
.cs-btn:hover{background:#EDE5D6}
.cs-btn-dark{background:#1B3D32;color:#fff;border-color:#1B3D32}
.cs-btn-dark:hover{background:#2C7A68;border-color:#2C7A68}
`;

var COLORS=['#2C7A68','#4A9B72','#7BB34A','#C49A2A','#B8602A','#8B5E9E','#4A7FA5','#9E5E88'];
var CATS=[
  {name:'Health',score:7},{name:'Career',score:6},
  {name:'Finance',score:5},{name:'Relationships',score:8},
  {name:'Growth',score:6},{name:'Fun & Joy',score:5},
  {name:'Environment',score:7},{name:'Family',score:8}
];

// Inject Google Fonts
if(!document.getElementById('cs-wol-fonts')){
  var lnk=document.createElement('link');
  lnk.id='cs-wol-fonts';
  lnk.rel='stylesheet';
  lnk.href='https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap';
  document.head.appendChild(lnk);
}

// Inject CSS
if(!document.getElementById('cs-wol-style')){
  var st=document.createElement('style');
  st.id='cs-wol-style';
  st.textContent=CSS;
  document.head.appendChild(st);
}

// Build HTML
var wrap=document.createElement('div');
wrap.id='cs-wol-wrap';
wrap.innerHTML=`
<div class="cs-head">
  <div class="cs-wordmark">Common Space</div>
  <div class="cs-title">Wheel of Life</div>
  <div class="cs-sub">Click segments to score &middot; Double-click a label to rename</div>
</div>
<div class="cs-canvas-wrap">
  <canvas id="cs-wol-canvas" width="520" height="520"></canvas>
  <div class="cs-tip" id="cs-tip"></div>
</div>
<div class="cs-cards" id="cs-cards"></div>
<p class="cs-hint">Drag sliders or click the wheel to update your scores</p>
<div class="cs-actions">
  <button class="cs-btn" id="cs-reset">Reset</button>
  <button class="cs-btn cs-btn-dark" id="cs-save">Download PNG</button>
</div>
`;

// Insert after the current script tag
var scripts=document.getElementsByTagName('script');
var me=scripts[scripts.length-1];
me.parentNode.insertBefore(wrap,me.nextSibling);

// Draw
var cv=document.getElementById('cs-wol-canvas');
var ctx=cv.getContext('2d');
var SZ=520,CX=260,CY=260,RINGS=10,N=8;
var OR=192,IR=20,LR=228,SLICE=Math.PI*2/N,GAP=0.025;
var hSeg=-1,hRing=-1;

function rgba(h,a){
  var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}
function segA(i){var b=i*SLICE-Math.PI/2;return{s:b+GAP/2,e:b+SLICE-GAP/2};}

function draw(){
  ctx.clearRect(0,0,SZ,SZ);
  ctx.beginPath();ctx.arc(CX,CY,OR+4,0,Math.PI*2);
  ctx.fillStyle='#E8DFCE';ctx.fill();
  for(var r=1;r<=RINGS;r++){
    ctx.beginPath();ctx.arc(CX,CY,IR+(OR-IR)*(r/RINGS),0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.55)';ctx.lineWidth=1;ctx.stroke();
  }
  for(var i=0;i<N;i++){
    var a=i*SLICE-Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(CX+Math.cos(a)*IR,CY+Math.sin(a)*IR);
    ctx.lineTo(CX+Math.cos(a)*OR,CY+Math.sin(a)*OR);
    ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=1.5;ctx.stroke();
  }
  for(var i=0;i<N;i++){
    var sa=segA(i),sc=CATS[i].score,co=COLORS[i];
    for(var r=0;r<RINGS;r++){
      var r1=IR+(OR-IR)*(r/RINGS),r2=IR+(OR-IR)*((r+1)/RINGS);
      ctx.beginPath();ctx.arc(CX,CY,r2,sa.s,sa.e);ctx.arc(CX,CY,r1,sa.e,sa.s,true);ctx.closePath();
      var filled=(r<sc),isHov=(hSeg===i&&hRing===r);
      ctx.fillStyle=filled?rgba(co,0.5+(r/RINGS)*0.45):(isHov?rgba(co,0.22):'rgba(255,255,255,0.12)');
      ctx.fill();
    }
    if(sc>0){
      var mid=(sa.s+sa.e)/2,br=IR+(OR-IR)*((sc-0.5)/RINGS);
      ctx.font='bold 9px DM Sans,sans-serif';ctx.fillStyle='rgba(255,255,255,0.92)';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(sc,CX+Math.cos(mid)*br,CY+Math.sin(mid)*br);
    }
  }
  ctx.beginPath();ctx.arc(CX,CY,IR,0,Math.PI*2);
  ctx.fillStyle='#F7F3EC';ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.9)';ctx.lineWidth=2;ctx.stroke();

  for(var i=0;i<N;i++){
    var sa=segA(i),mid=(sa.s+sa.e)/2;
    var lx=CX+Math.cos(mid)*LR,ly=CY+Math.sin(mid)*LR;
    ctx.save();ctx.translate(lx,ly);
    var rot=mid+Math.PI/2;
    if(mid>Math.PI/2&&mid<Math.PI*1.5)rot+=Math.PI;
    ctx.rotate(rot);
    ctx.font=(hSeg===i?'500':'400')+' 11.5px DM Sans,sans-serif';
    ctx.fillStyle=hSeg===i?COLORS[i]:'#1B3D32';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(CATS[i].name,0,0);ctx.restore();
  }
}

function cxy(e){
  var rect=cv.getBoundingClientRect(),sx=SZ/rect.width,sy=SZ/rect.height;
  var src=e.touches?e.touches[0]:e;
  return{x:(src.clientX-rect.left)*sx,y:(src.clientY-rect.top)*sy};
}
function hit(x,y){
  var dx=x-CX,dy=y-CY,d=Math.sqrt(dx*dx+dy*dy);
  if(d<IR||d>OR)return{seg:-1,ring:-1};
  var a=Math.atan2(dy,dx)+Math.PI/2;
  if(a<0)a+=Math.PI*2;
  return{seg:Math.floor(a/SLICE)%N,ring:Math.min(Math.floor((d-IR)/(OR-IR)*RINGS),RINGS-1)};
}

cv.addEventListener('mousemove',function(e){
  var p=cxy(e),h=hit(p.x,p.y),tip=document.getElementById('cs-tip');
  if(h.seg>=0){
    hSeg=h.seg;hRing=h.ring;
    tip.textContent=CATS[h.seg].name+' — set to '+(h.ring+1);
    var rect=cv.getBoundingClientRect(),f=SZ/rect.width;
    tip.style.left=(p.x/f)+'px';tip.style.top=((p.y/f)-4)+'px';
    tip.classList.add('on');cv.style.cursor='pointer';
  } else {
    hSeg=-1;hRing=-1;tip.classList.remove('on');cv.style.cursor='default';
  }
  draw();
});
cv.addEventListener('mouseleave',function(){hSeg=-1;hRing=-1;document.getElementById('cs-tip').classList.remove('on');draw();});
cv.addEventListener('click',function(e){var p=cxy(e),h=hit(p.x,p.y);if(h.seg>=0){CATS[h.seg].score=h.ring+1;sync();draw();}});
cv.addEventListener('touchstart',function(e){e.preventDefault();var p=cxy(e),h=hit(p.x,p.y);if(h.seg>=0){CATS[h.seg].score=h.ring+1;sync();draw();}},{passive:false});
cv.addEventListener('dblclick',function(e){
  var p=cxy(e),dx=p.x-CX,dy=p.y-CY,d=Math.sqrt(dx*dx+dy*dy);
  if(d>OR-8){
    var a=Math.atan2(dy,dx)+Math.PI/2;if(a<0)a+=Math.PI*2;
    var seg=Math.floor(a/SLICE)%N;
    var n=prompt('Rename:',CATS[seg].name);
    if(n&&n.trim()){CATS[seg].name=n.trim();sync();draw();}
  }
});

function buildCards(){
  var el=document.getElementById('cs-cards');el.innerHTML='';
  CATS.forEach(function(c,i){
    var d=document.createElement('div');d.className='cs-card';d.id='csc'+i;
    d.innerHTML='<div class="cs-cname" style="color:'+COLORS[i]+'">'+c.name+'</div>'
      +'<div class="cs-cscore" id="csv'+i+'">'+c.score+'</div>'
      +'<input type="range" class="cs-cslider" min="0" max="10" step="1" value="'+c.score+'" id="cssl'+i+'">';
    d.querySelector('input').addEventListener('input',function(){
      CATS[i].score=+this.value;document.getElementById('csv'+i).textContent=this.value;draw();
    });
    el.appendChild(d);
  });
}
function sync(){
  CATS.forEach(function(c,i){
    var ev=document.getElementById('csv'+i),sl=document.getElementById('cssl'+i),nm=document.querySelector('#csc'+i+' .cs-cname');
    if(ev)ev.textContent=c.score;if(sl)sl.value=c.score;if(nm)nm.textContent=c.name;
  });
}

document.getElementById('cs-reset').addEventListener('click',function(){CATS.forEach(function(c){c.score=0;});sync();draw();});
document.getElementById('cs-save').addEventListener('click',function(){
  var t=document.createElement('canvas');t.width=SZ;t.height=SZ;
  var tc=t.getContext('2d');tc.fillStyle='#F7F3EC';tc.fillRect(0,0,SZ,SZ);tc.drawImage(cv,0,0);
  var a=document.createElement('a');a.download='wheel-of-life.png';a.href=t.toDataURL();a.click();
});

buildCards();draw();
})();
</script>
